<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RemoteTail</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #313338;
    --panel: #2b2d31;
    --border: #3f4147;
    --border2: #4e5058;
    --green: #23a55a;
    --green-dim: #23a55a44;
    --green-glow: #23a55a18;
    --cyan: #00a8fc;
    --yellow: #f0b232;
    --red: #f23f42;
    --red-dim: #f23f4222;
    --text: #f2f3f5;
    --text-dim: #b5bac1;
    --text-muted: #80848e;
    --input-bg: #1e1f22;
    --scrollbar: #1e1f22;
  }

  [data-theme="light"] {
    --bg: #f0f4f8;
    --panel: #ffffff;
    --border: #dde3ed;
    --border2: #c4cfe0;
    --green: #007a4d;
    --green-dim: #007a4d30;
    --green-glow: #007a4d12;
    --cyan: #006fa0;
    --yellow: #8a6200;
    --red: #c01f38;
    --red-dim: #c01f3818;
    --text: #1a2535;
    --text-dim: #445a72;
    --text-muted: #7a8fa6;
    --input-bg: #f7f9fc;
    --scrollbar: #b8c8d8;
  }

  [data-theme="light"] body::before { display: none; }
  [data-theme="light"] .line-text.level-error   { color: #b81a30; }
  [data-theme="light"] .line-text.level-warn    { color: #7a5500; }
  [data-theme="light"] .line-text.level-debug   { color: #607080; }
  [data-theme="light"] .line-text.level-success { color: #006e40; }
  [data-theme="light"] .log-line.status-line .line-text { color: #006fa0; }
  [data-theme="light"] .highlight { background: rgba(200,160,0,0.2); color: #7a5500; }
  [data-theme="light"] .tab-bar  { background: #e3e5e8; }
  [data-theme="light"] .tab.active { background: #ffffff; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.05em; color: var(--green); text-shadow: 0 0 20px var(--green-dim); }
  .logo span { color: var(--cyan); }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; transition: all 0.3s; }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  #status-text { font-size: 11px; color: var(--text-dim); flex: 1; }

  .header-actions { display: flex; gap: 8px; margin-left: auto; }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .btn-sm:hover { border-color: var(--green); color: var(--green); }
  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    transition: width 0.3s;
  }
  .sidebar.collapsed { width: 0; overflow: hidden; }

  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }

  .section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }

  .field { margin-bottom: 10px; }

  label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 4px; letter-spacing: 0.05em; }

  input, select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--green); }
  input::placeholder { color: var(--text-muted); }
  select option { background: var(--panel); }

  .row2 { display: flex; gap: 8px; }
  .row2 .field { flex: 1; }

  textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 8px;
    border-radius: 3px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--green); }
  textarea::placeholder { color: var(--text-muted); }

  .auth-section { display: none; }
  .auth-section.active { display: block; }

  .connect-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 9px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .connect-btn:hover { background: var(--green-glow); box-shadow: 0 0 20px var(--green-dim); }
  .connect-btn.disconnect { border-color: var(--red); color: var(--red); }
  .connect-btn.disconnect:hover { background: var(--red-dim); box-shadow: 0 0 20px var(--red-dim); }

  .log-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  .log-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .search-wrap { position: relative; flex: 1; }
  .search-wrap input { padding-left: 28px; font-size: 12px; height: 28px; }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 12px; }
  .match-count { font-size: 10px; color: var(--text-dim); white-space: nowrap; }
  .toolbar-sep { width: 1px; height: 16px; background: var(--border2); }

  .toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); cursor: pointer; white-space: nowrap; }
  .toggle { width: 28px; height: 14px; border-radius: 7px; background: var(--border2); position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle::after { content: ''; position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--text-dim); top: 2px; left: 2px; transition: all 0.2s; }
  .toggle.on { background: var(--green-dim); }
  .toggle.on::after { background: var(--green); left: 16px; }

  /* Tab bar */
  .tab-bar {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 14px;
    height: 34px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    border-right: 1px solid var(--border);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
    user-select: none;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.02); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); background: rgba(0,255,136,0.03); }

  .tab-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; transition: all 0.2s; }
  .tab.connected .tab-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .tab.error-state .tab-dot { background: var(--red); }

  .tab-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 1px 3px;
    border-radius: 2px;
    margin-left: 2px;
    transition: all 0.15s;
  }
  .tab-close:hover { color: var(--red); background: var(--red-dim); }

  .btn-new-tab {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 18px;
    padding: 0 14px;
    flex-shrink: 0;
    transition: color 0.2s;
    align-self: center;
  }
  .btn-new-tab:hover { color: var(--green); }

  /* Log container */
  .log-container { flex: 1; overflow: hidden; position: relative; }

  .log-output {
    display: none;
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 12px 0;
    font-size: 12.5px;
    line-height: 1.65;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar) transparent;
  }
  .log-output.active { display: block; }
  .log-output::-webkit-scrollbar { width: 6px; }
  .log-output::-webkit-scrollbar-track { background: transparent; }
  .log-output::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  .log-line { padding: 1px 16px; transition: background 0.1s; display: flex; gap: 12px; }
  .log-line:hover { background: rgba(255,255,255,0.02); }
  .line-num { color: var(--text-muted); font-size: 10px; user-select: none; min-width: 40px; text-align: right; padding-top: 1px; flex-shrink: 0; }
  .line-text { flex: 1; word-break: break-all; }

  .line-text.level-error { color: #ff6b6b; }
  .line-text.level-warn  { color: #f0b232; }
  .line-text.level-info  { color: var(--text); }
  .line-text.level-debug { color: #9aa3b2; }
  .line-text.level-success { color: #3ba55d; }
  .log-line.status-line .line-text { color: var(--cyan); font-style: italic; }


  .highlight { background: rgba(255, 214, 10, 0.25); color: var(--yellow); border-radius: 2px; padding: 0 1px; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text-muted); }
  .empty-icon { font-size: 36px; opacity: 0.3; }
  .empty-text { font-size: 12px; letter-spacing: 0.05em; }

  .log-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 14px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  #line-count, #byte-count { color: var(--text-dim); }
  .footer-spacer { flex: 1; }

  .sidebar-toggle { background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 4px 6px; font-size: 14px; border-radius: 3px; transition: color 0.2s; }
  .sidebar-toggle:hover { color: var(--green); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes newLine {
    0%   { box-shadow: inset 3px 0 0 var(--green); background: rgba(35,165,90,0.15); }
    55%  { box-shadow: inset 3px 0 0 var(--green); background: rgba(35,165,90,0.08); }
    100% { box-shadow: none; background: transparent; }
  }
  .log-line { animation: fadeIn 0.1s ease; }
  .log-line-new { animation: fadeIn 0.1s ease, newLine 3s ease forwards; }

  @keyframes lineFlash { 0% { background: rgba(255,214,10,0.35); } 100% { background: transparent; } }
  .line-flash { animation: lineFlash 1s ease; }

  /* Find panel */
  .find-panel {
    display: none;
    flex-direction: column;
    border-top: 2px solid var(--border2);
    background: var(--panel);
    flex-shrink: 0;
    height: 220px;
    position: relative;
  }
  .find-panel.open { display: flex; }

  .find-resize {
    position: absolute;
    top: -4px; left: 0; right: 0;
    height: 8px;
    cursor: n-resize;
    z-index: 10;
  }
  .find-resize:hover { background: rgba(0,255,136,0.08); }

  .find-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .find-title { font-size: 9px; font-weight: 600; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; white-space: nowrap; }
  .find-header input { flex: 1; height: 26px; font-size: 12px; }
  .find-count { font-size: 10px; color: var(--text-dim); white-space: nowrap; min-width: 70px; text-align: right; }

  .find-close {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; padding: 0 4px;
    border-radius: 2px; transition: color 0.2s; line-height: 1;
  }
  .find-close:hover { color: var(--red); }

  .find-results {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar) transparent;
  }
  .find-results::-webkit-scrollbar { width: 6px; }
  .find-results::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  .find-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 11px; }

  .find-item {
    display: flex;
    gap: 12px;
    padding: 2px 16px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 12px;
    line-height: 1.6;
  }
  .find-item:hover { background: rgba(0,255,136,0.05); }
  .find-item:hover .find-item-num { color: var(--cyan); }

  .find-item-num { color: var(--text-muted); font-size: 10px; min-width: 40px; text-align: right; padding-top: 2px; flex-shrink: 0; user-select: none; }
  .find-item-text { flex: 1; word-break: break-all; color: var(--text-dim); }

  /* File browser modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .browse-modal {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 4px;
    width: 560px;
    max-width: 92vw;
    height: 520px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }

  .browse-modal-header {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .browse-modal-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--green); flex: 1; }
  .browse-modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; padding: 0 4px; border-radius: 2px; transition: color 0.2s; line-height: 1; }
  .browse-modal-close:hover { color: var(--red); }

  .browse-path-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .browse-path-bar input { flex: 1; font-size: 11px; height: 26px; }

  .browse-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar) transparent;
  }
  .browse-list::-webkit-scrollbar { width: 6px; }
  .browse-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  .browse-sort-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .browse-sort-label { font-size: 10px; color: var(--text-muted); margin-right: 2px; }
  .browse-sort-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .browse-sort-btn:hover { border-color: var(--green); color: var(--green); }
  .browse-sort-btn.active { border-color: var(--green); color: var(--green); background: var(--green-glow); }

  .browse-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 16px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 12px;
    user-select: none;
  }
  .browse-entry:hover { background: rgba(255,255,255,0.03); }
  .browse-entry.is-dir { color: var(--cyan); }
  .browse-entry.is-file { color: var(--text-dim); }
  .browse-entry.is-file:hover { color: var(--green); background: rgba(0,255,136,0.04); }

  .browse-icon { font-size: 13px; flex-shrink: 0; width: 18px; }
  .browse-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .browse-size { color: var(--text-muted); font-size: 10px; white-space: nowrap; min-width: 56px; text-align: right; }
  .browse-date { color: var(--text-muted); font-size: 10px; white-space: nowrap; min-width: 110px; text-align: right; }

  .browse-status {
    padding: 5px 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .browse-msg { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 12px; }
  .browse-msg.error { color: var(--red); }

  /* Key file picker */
  .key-pick-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--input-bg);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 4px 4px 4px 8px;
    transition: border-color 0.2s;
  }
  .key-filename {
    flex: 1;
    font-size: 11px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .key-filename.loaded { color: var(--green); }
</style>
</head>
<body>

<header>
  <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">☰</button>
  <div class="logo">REMOTE<span>TAIL</span></div>
  <div class="status-dot" id="status-dot"></div>
  <div id="status-text">Not connected</div>
  <div class="header-actions">
    <button class="btn-sm" id="btn-theme" title="Switch to light theme">☀</button>
    <button class="btn-sm" id="btn-clear">Clear</button>
    <button class="btn-sm" id="btn-copy">Copy All</button>
    <button class="btn-sm" id="btn-download">Download</button>
  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar">

    <!-- Always-visible: connection selector -->
    <div class="sidebar-section">
      <div class="section-label">Connection</div>
      <div class="field" id="saved-configs-wrap" style="display:none">
        <select id="config-select" style="width:100%"></select>
      </div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button class="btn-sm" id="btn-new-config" style="flex:1">+ New</button>
        <button class="btn-sm" id="btn-edit-config" style="flex:1" disabled>Edit</button>
        <button class="btn-sm danger" id="btn-delete-config" title="Delete" disabled>✕</button>
      </div>
    </div>

    <!-- Browse section: visible after a connection is selected -->
    <div id="browse-section" style="display:none">
      <div class="sidebar-section">
        <div class="section-label">Log File</div>
        <button class="connect-btn" id="btn-browse" style="margin-bottom:10px;letter-spacing:0.05em;font-size:11px">Browse Remote Files</button>
        <div class="field">
          <label>OR ENTER PATH MANUALLY</label>
          <input type="text" id="file-path" placeholder="/var/log/app/server.log" />
        </div>
        <div class="field">
          <label>INITIAL LINES</label>
          <input type="number" id="tail-lines" value="100" min="1" max="5000" />
        </div>
      </div>
      <div class="sidebar-section">
        <button class="connect-btn" id="connect-btn">⚡ Connect</button>
      </div>
    </div>

    <!-- Form: shown only on New or Edit -->
    <div id="connection-form" style="display:none">

      <div class="sidebar-section">
        <div class="field">
          <label>CONFIG NAME</label>
          <input type="text" id="config-name" placeholder="e.g. Production" />
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">SSH Connection</div>
        <div class="row2">
          <div class="field">
            <label>HOST</label>
            <input type="text" id="host" placeholder="192.168.1.1" />
          </div>
          <div class="field" style="max-width:70px">
            <label>PORT</label>
            <input type="number" id="port" placeholder="22" value="22" />
          </div>
        </div>
        <div class="field">
          <label>USERNAME</label>
          <input type="text" id="username" placeholder="ubuntu" />
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Authentication</div>
        <div class="field">
          <label>AUTH TYPE</label>
          <select id="auth-type">
            <option value="password">Password</option>
            <option value="key">Private Key</option>
          </select>
        </div>
        <div class="auth-section active" id="auth-password">
          <div class="field">
            <label>PASSWORD</label>
            <input type="password" id="password" placeholder="••••••••" />
          </div>
        </div>
        <div class="auth-section" id="auth-key">
          <div class="field">
            <label>PRIVATE KEY (.pem / .ppk)</label>
            <div class="key-pick-row">
              <span class="key-filename" id="key-filename">No file selected</span>
              <button class="btn-sm" id="btn-pick-key">Pick file</button>
            </div>
            <input type="file" id="private-key-file" accept=".pem,.ppk" style="display:none" />
          </div>
          <div class="field">
            <label>PASSPHRASE (if any)</label>
            <input type="password" id="passphrase" placeholder="optional" />
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <div style="display:flex;gap:6px">
          <button class="btn-sm" id="btn-save-config" style="flex:1">Save</button>
          <button class="btn-sm" id="btn-cancel-form" style="flex:1">Cancel</button>
        </div>
      </div>

    </div>

  </div>

  <div class="log-panel">
    <div class="log-toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Filter logs..." />
      </div>
      <span class="match-count" id="match-count"></span>
      <div class="toolbar-sep"></div>
      <label class="toggle-wrap" title="Auto-scroll to bottom">
        <div class="toggle on" id="autoscroll-toggle"></div>
        Auto-scroll
      </label>
      <div class="toolbar-sep"></div>
      <label class="toggle-wrap" title="Wrap long lines">
        <div class="toggle on" id="wrap-toggle"></div>
        Wrap
      </label>
      <div class="toolbar-sep"></div>
      <button class="btn-sm" id="btn-find-panel" title="Find in log (Ctrl+F)">Find</button>
    </div>

    <div class="tab-bar" id="tab-bar">
      <button class="btn-new-tab" id="btn-new-tab" title="New tab">+</button>
    </div>

    <div class="log-container" id="log-container"></div>

    <div class="find-panel" id="find-panel">
      <div class="find-resize" id="find-resize"></div>
      <div class="find-header">
        <span class="find-title">Find in log</span>
        <input type="text" id="find-input" placeholder="Search pattern..." />
        <span class="find-count" id="find-count"></span>
        <button class="find-close" id="find-close" title="Close (Esc)">×</button>
      </div>
      <div class="find-results" id="find-results">
        <div class="find-empty">Type to search in current tab's log</div>
      </div>
    </div>

    <div class="log-footer">
      <span>Lines: <span id="line-count">0</span></span>
      <span>Size: <span id="byte-count">0 B</span></span>
      <span class="footer-spacer"></span>
      <span id="last-update"></span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="browse-overlay">
  <div class="browse-modal">
    <div class="browse-modal-header">
      <span class="browse-modal-title">Browse Remote Files</span>
      <button class="browse-modal-close" id="browse-close">×</button>
    </div>
    <div class="browse-path-bar">
      <button class="btn-sm" id="browse-up" title="Parent directory">↑</button>
      <input type="text" id="browse-path-input" placeholder="/" />
      <button class="btn-sm" id="browse-go">Go</button>
    </div>
    <div class="browse-sort-bar">
      <span class="browse-sort-label">Sort:</span>
      <button class="browse-sort-btn active" id="sort-by-name">Name ↑</button>
      <button class="browse-sort-btn" id="sort-by-date">Date</button>
    </div>
    <div class="browse-list" id="browse-list">
      <div class="browse-msg">Enter credentials then click Browse</div>
    </div>
    <div class="browse-status" id="browse-status"></div>
  </div>
</div>

<script>
  // ── Elements ──────────────────────────────────────────────────────────────
  const statusDot    = document.getElementById('status-dot');
  const statusText   = document.getElementById('status-text');
  const connectBtn   = document.getElementById('connect-btn');
  const searchInput  = document.getElementById('search');
  const matchCount   = document.getElementById('match-count');
  const autoscrollToggle = document.getElementById('autoscroll-toggle');
  const wrapToggle   = document.getElementById('wrap-toggle');
  const tabBar       = document.getElementById('tab-bar');
  const logContainer = document.getElementById('log-container');
  const newTabBtn    = document.getElementById('btn-new-tab');

  // ── Tab state ─────────────────────────────────────────────────────────────
  let tabs = [];
  let activeTabId = null;
  let tabCounter = 0;

  function makeEmptyState() {
    const d = document.createElement('div');
    d.className = 'empty-state';
    d.innerHTML = '<div class="empty-icon">⬛</div><div class="empty-text">Configure connection and press Connect</div>';
    return d;
  }

  function createTab(name) {
    const id = ++tabCounter;
    const logEl = document.createElement('div');
    logEl.className = 'log-output';
    const emptyEl = makeEmptyState();
    logEl.appendChild(emptyEl);
    logContainer.appendChild(logEl);

    const tab = {
      id, name: name || `Tab ${id}`,
      ws: null, connected: false,
      allLogs: [], lineCount: 0, byteCount: 0,
      autoScroll: true, wrapLines: true,
      logEl, emptyEl,
    };
    tabs.push(tab);
    renderTabBar();
    switchTab(id);
    return tab;
  }

  function closeTab(id) {
    if (tabs.length <= 1) return;
    const tab = getTab(id);
    if (!tab) return;
    disconnectTab(tab);
    tab.logEl.remove();
    tabs = tabs.filter(t => t.id !== id);
    if (activeTabId === id) {
      switchTab(tabs[tabs.length - 1].id);
    } else {
      renderTabBar();
    }
  }

  function getTab(id) { return tabs.find(t => t.id === id); }
  function getActiveTab() { return getTab(activeTabId); }

  function switchTab(id) {
    activeTabId = id;
    const tab = getTab(id);
    if (!tab) return;

    tabs.forEach(t => t.logEl.classList.remove('active'));
    tab.logEl.classList.add('active');

    renderTabBar();
    updateFooter(tab);

    autoscrollToggle.classList.toggle('on', tab.autoScroll);
    wrapToggle.classList.toggle('on', tab.wrapLines);

    searchInput.value = '';
    matchCount.textContent = '';
    if (document.getElementById('find-panel').classList.contains('open')) runFind();

    if (tab.connected) {
      statusDot.className = 'status-dot connected';
      statusText.textContent = 'Connected';
      connectBtn.textContent = '⏹ Disconnect';
      connectBtn.classList.add('disconnect');
    } else {
      statusDot.className = 'status-dot';
      statusText.textContent = 'Not connected';
      connectBtn.textContent = '⚡ Connect';
      connectBtn.classList.remove('disconnect');
    }
  }

  function renderTabBar() {
    tabBar.querySelectorAll('.tab').forEach(el => el.remove());
    tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab' + (tab.id === activeTabId ? ' active' : '') + (tab.connected ? ' connected' : '');
      el.dataset.id = tab.id;

      const dot = document.createElement('span');
      dot.className = 'tab-dot';

      const name = document.createElement('span');
      name.textContent = tab.name;

      el.appendChild(dot);
      el.appendChild(name);

      if (tabs.length > 1) {
        const closeBtn = document.createElement('button');
        closeBtn.className = 'tab-close';
        closeBtn.textContent = '×';
        closeBtn.title = 'Close tab';
        closeBtn.addEventListener('click', e => { e.stopPropagation(); closeTab(tab.id); });
        el.appendChild(closeBtn);
      }

      el.addEventListener('click', () => switchTab(tab.id));
      tabBar.insertBefore(el, newTabBtn);
    });
  }

  newTabBtn.addEventListener('click', () => createTab());

  // ── Configs (persisted to disk via server API) ───────────────────────────
  let _configs = {};

  const { invoke } = window.__TAURI__.core;
  const { listen } = window.__TAURI__.event;

  async function initConfigs() {
    try { _configs = await invoke('get_configs'); } catch { _configs = {}; }
    refreshConfigSelect();
    updateBrowseSection();
  }

  function saveAllConfigs(data) {
    _configs = data;
    invoke('save_configs', { data }).catch(() => {});
  }

  function getCurrentFormValues() {
    return {
      host:           document.getElementById('host').value,
      port:           document.getElementById('port').value,
      username:       document.getElementById('username').value,
      authType:       document.getElementById('auth-type').value,
      password:       document.getElementById('password').value,
      privateKey:     privateKeyContent,
      privateKeyName: privateKeyName,
      passphrase:     document.getElementById('passphrase').value,
    };
  }

  function applyConfig(cfg) {
    document.getElementById('host').value       = cfg.host || '';
    document.getElementById('port').value       = cfg.port || '22';
    document.getElementById('username').value   = cfg.username || '';
    document.getElementById('auth-type').value  = cfg.authType || 'password';
    document.getElementById('auth-type').dispatchEvent(new Event('change'));
    document.getElementById('password').value   = cfg.password || '';
    document.getElementById('passphrase').value = cfg.passphrase || '';
    privateKeyContent = cfg.privateKey || '';
    privateKeyName    = cfg.privateKeyName || '';
    const el = document.getElementById('key-filename');
    el.textContent = privateKeyName || 'No file selected';
    el.classList.toggle('loaded', !!privateKeyName);
  }

  function refreshConfigSelect(selectName) {
    const names = Object.keys(_configs);
    const wrap   = document.getElementById('saved-configs-wrap');
    const select = document.getElementById('config-select');
    const editBtn = document.getElementById('btn-edit-config');
    const delBtn  = document.getElementById('btn-delete-config');

    wrap.style.display = names.length ? '' : 'none';
    select.innerHTML = '';

    const empty = document.createElement('option');
    empty.value = ''; empty.textContent = '— select —';
    select.appendChild(empty);

    names.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      select.appendChild(opt);
    });

    if (selectName && names.includes(selectName)) select.value = selectName;

    const hasSelection = !!select.value;
    editBtn.disabled = !hasSelection;
    delBtn.disabled  = !hasSelection;
  }

  function updateBrowseSection() {
    const hasConnection = !!document.getElementById('config-select').value;
    const formOpen = document.getElementById('connection-form').style.display !== 'none';
    document.getElementById('browse-section').style.display =
      hasConnection && !formOpen ? '' : 'none';
  }

  function showForm(mode) {
    document.getElementById('connection-form').style.display = '';
    document.getElementById('browse-section').style.display = 'none';
    if (mode === 'new') {
      document.getElementById('config-name').value = '';
      document.getElementById('host').value = '';
      document.getElementById('port').value = '22';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('passphrase').value = '';
      document.getElementById('auth-type').value = 'password';
      document.getElementById('auth-type').dispatchEvent(new Event('change'));
      privateKeyContent = ''; privateKeyName = '';
      const el = document.getElementById('key-filename');
      el.textContent = 'No file selected'; el.classList.remove('loaded');
    }
    document.getElementById('config-name').focus();
  }

  function hideForm() {
    document.getElementById('connection-form').style.display = 'none';
    updateBrowseSection();
  }

  document.getElementById('btn-new-config').addEventListener('click', () => showForm('new'));

  document.getElementById('btn-edit-config').addEventListener('click', () => {
    const name = document.getElementById('config-select').value;
    if (!name || !_configs[name]) return;
    document.getElementById('config-name').value = name;
    applyConfig(_configs[name]);
    showForm('edit');
  });

  document.getElementById('btn-save-config').addEventListener('click', () => {
    const name = document.getElementById('config-name').value.trim();
    if (!name) { document.getElementById('config-name').focus(); return; }
    _configs[name] = getCurrentFormValues();
    saveAllConfigs(_configs);
    refreshConfigSelect(name);
    hideForm();
  });

  document.getElementById('btn-cancel-form').addEventListener('click', hideForm);

  document.getElementById('btn-delete-config').addEventListener('click', () => {
    const name = document.getElementById('config-select').value;
    if (!name) return;
    if (!confirm(`Delete connection "${name}"?`)) return;
    delete _configs[name];
    saveAllConfigs(_configs);
    refreshConfigSelect();
    updateBrowseSection();
  });

  document.getElementById('config-select').addEventListener('change', e => {
    const cfg = _configs[e.target.value];
    if (cfg) applyConfig(cfg);
    const hasVal = !!e.target.value;
    document.getElementById('btn-edit-config').disabled = !hasVal;
    document.getElementById('btn-delete-config').disabled = !hasVal;
    updateBrowseSection();
  });

  // ── Auth type toggle ──────────────────────────────────────────────────────
  document.getElementById('auth-type').addEventListener('change', e => {
    document.getElementById('auth-password').classList.toggle('active', e.target.value === 'password');
    document.getElementById('auth-key').classList.toggle('active', e.target.value === 'key');
  });

  // ── Sidebar toggle ────────────────────────────────────────────────────────
  document.getElementById('sidebar-toggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
  });

  // ── Auto-scroll toggle ────────────────────────────────────────────────────
  autoscrollToggle.addEventListener('click', () => {
    const tab = getActiveTab();
    if (!tab) return;
    tab.autoScroll = !tab.autoScroll;
    autoscrollToggle.classList.toggle('on', tab.autoScroll);
  });

  // ── Wrap toggle ───────────────────────────────────────────────────────────
  wrapToggle.addEventListener('click', () => {
    const tab = getActiveTab();
    if (!tab) return;
    tab.wrapLines = !tab.wrapLines;
    wrapToggle.classList.toggle('on', tab.wrapLines);
    tab.logEl.querySelectorAll('.line-text').forEach(el => {
      el.style.whiteSpace = tab.wrapLines ? '' : 'nowrap';
      el.style.overflow   = tab.wrapLines ? '' : 'hidden';
    });
    tab.logEl.style.overflowX = tab.wrapLines ? '' : 'auto';
  });

  // ── Search / filter ───────────────────────────────────────────────────────
  searchInput.addEventListener('input', renderFilter);

  function renderFilter() {
    const tab = getActiveTab();
    if (!tab) return;
    const q = searchInput.value.trim().toLowerCase();
    let matches = 0;

    tab.logEl.querySelectorAll('.log-line').forEach(line => {
      if (line.classList.contains('status-line')) return;
      const text = line.querySelector('.line-text').textContent.toLowerCase();
      const visible = !q || text.includes(q);
      line.style.display = visible ? '' : 'none';
      if (visible && q) matches++;
    });

    tab.logEl.querySelectorAll('.log-line:not(.status-line) .line-text').forEach(el => {
      if (q) {
        const raw = el.dataset.raw || el.textContent;
        el.dataset.raw = raw;
        el.innerHTML = raw.replace(new RegExp(`(${escapeRe(q)})`, 'gi'), '<span class="highlight">$1</span>');
      } else if (el.dataset.raw) {
        el.textContent = el.dataset.raw;
      }
    });

    matchCount.textContent = q ? `${matches} match${matches !== 1 ? 'es' : ''}` : '';
  }

  function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  // ── Log rendering ─────────────────────────────────────────────────────────
  function detectLevel(text) {
    const t = text.toUpperCase();
    if (/\b(ERROR|ERR|FATAL|EXCEPTION|TRACEBACK|PANIC)\b/.test(t)) return 'error';
    if (/\b(WARN|WARNING)\b/.test(t)) return 'warn';
    if (/\b(DEBUG|TRACE|VERBOSE)\b/.test(t)) return 'debug';
    if (/\b(SUCCESS|OK|DONE|STARTED|READY)\b/.test(t)) return 'success';
    return 'info';
  }

  function appendLog(tab, text, isStatus = false, isError = false) {
    if (tab.emptyEl) { tab.emptyEl.remove(); tab.emptyEl = null; }

    const rawLines = text.split('\n').filter(Boolean);
    if (!rawLines.length) return;

    const frag = document.createDocumentFragment();
    const q = (tab.id === activeTabId) ? searchInput.value.trim().toLowerCase() : '';

    rawLines.forEach(rawLine => {
      tab.allLogs.push({ text: rawLine, isStatus, isError });
      tab.lineCount++;
      tab.byteCount += rawLine.length;

      const div = document.createElement('div');
      div.className = 'log-line' + (isStatus ? ' status-line' : ' log-line-new');
      div.dataset.line = tab.lineCount;
      if (!isStatus) div.addEventListener('animationend', e => {
        if (e.animationName === 'newLine') div.classList.remove('log-line-new');
      });

      const numEl = document.createElement('span');
      numEl.className = 'line-num';
      numEl.textContent = tab.lineCount;

      const textEl = document.createElement('span');
      textEl.className = 'line-text';
      if (isError) textEl.classList.add('level-error');
      else if (!isStatus) textEl.classList.add(`level-${detectLevel(rawLine)}`);
      textEl.dataset.raw = rawLine;
      textEl.textContent = rawLine;
      if (!tab.wrapLines) { textEl.style.whiteSpace = 'nowrap'; textEl.style.overflow = 'hidden'; }

      if (q && !isStatus) {
        if (!rawLine.toLowerCase().includes(q)) {
          div.style.display = 'none';
        } else {
          textEl.innerHTML = rawLine.replace(new RegExp(`(${escapeRe(q)})`, 'gi'), '<span class="highlight">$1</span>');
        }
      }

      div.appendChild(numEl);
      div.appendChild(textEl);
      frag.appendChild(div);
    });

    tab.logEl.appendChild(frag);

    if (tab.id === activeTabId) {
      updateFooter(tab);
      if (tab.autoScroll) tab.logEl.scrollTop = tab.logEl.scrollHeight;
      if (document.getElementById('find-panel').classList.contains('open')) runFind();
    }
  }

  function updateFooter(tab) {
    document.getElementById('line-count').textContent = tab.lineCount;
    document.getElementById('byte-count').textContent = formatBytes(tab.byteCount);
    document.getElementById('last-update').textContent = tab.allLogs.length ? new Date().toLocaleTimeString() : '';
  }

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }

  function setStatus(state, text) {
    statusText.textContent = text;
    statusDot.className = 'status-dot ' + state;
  }

  connectBtn.addEventListener('click', () => {
    const tab = getActiveTab();
    if (!tab) return;
    tab.connected ? disconnectTab(tab) : connectTab(tab);
  });

  function connectTab(tab) {
    const host     = document.getElementById('host').value.trim();
    const port     = parseInt(document.getElementById('port').value) || 22;
    const username = document.getElementById('username').value.trim();
    const authType = document.getElementById('auth-type').value;
    const filePath = document.getElementById('file-path').value.trim();
    const lines    = parseInt(document.getElementById('tail-lines').value) || 100;

    if (!host || !username || !filePath) {
      setStatus('error', 'Please fill in Host, Username, and File Path');
      return;
    }

    // Name tab after connection
    const fileName = filePath.split('/').filter(Boolean).pop() || filePath;
    tab.name = `${host}: ${fileName}`;
    renderTabBar();

    setStatus('', 'Connecting...');

    const args = {
      tabId: String(tab.id),
      host, port, username, authType, filePath, lines,
      password:   authType === 'password' ? document.getElementById('password').value : null,
      privateKey: authType === 'key'      ? privateKeyContent : null,
      passphrase: authType === 'key'      ? document.getElementById('passphrase').value : null,
    };

    invoke('ssh_connect', args).catch(err => {
      if (tab.id === activeTabId) setStatus('error', String(err));
      appendLog(tab, '✖ ' + err, false, true);
    });
  }

  function disconnectTab(tab) {
    if (!tab.connected) return;
    invoke('ssh_disconnect', { tabId: String(tab.id) }).catch(() => {});
    tab.connected = false;
    if (tab.id === activeTabId) {
      setStatus('', 'Disconnected');
      connectBtn.textContent = '⚡ Connect';
      connectBtn.classList.remove('disconnect');
    }
    renderTabBar();
  }

  // ── Toolbar actions ───────────────────────────────────────────────────────
  document.getElementById('btn-clear').addEventListener('click', () => {
    const tab = getActiveTab();
    if (!tab) return;
    tab.logEl.innerHTML = '';
    tab.emptyEl = makeEmptyState();
    tab.logEl.appendChild(tab.emptyEl);
    tab.allLogs = []; tab.lineCount = 0; tab.byteCount = 0;
    updateFooter(tab);
    matchCount.textContent = '';
    searchInput.value = '';
  });

  document.getElementById('btn-copy').addEventListener('click', () => {
    const tab = getActiveTab();
    if (!tab) return;
    navigator.clipboard.writeText(tab.allLogs.map(l => l.text).join('\n')).catch(() => {});
  });

  document.getElementById('btn-download').addEventListener('click', () => {
    const tab = getActiveTab();
    if (!tab) return;
    const blob = new Blob([tab.allLogs.map(l => l.text).join('\n')], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `logtail-${Date.now()}.log`;
    a.click();
  });

  // ── Private key file picker ───────────────────────────────────────────────
  let privateKeyContent = '';
  let privateKeyName    = '';

  document.getElementById('btn-pick-key').addEventListener('click', () => {
    document.getElementById('private-key-file').click();
  });

  document.getElementById('private-key-file').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      privateKeyContent = ev.target.result;
      privateKeyName    = file.name;
      const el = document.getElementById('key-filename');
      el.textContent = file.name;
      el.classList.add('loaded');
    };
    reader.readAsText(file);
    e.target.value = ''; // allow re-selecting same file
  });

  // ── File browser ──────────────────────────────────────────────────────────
  const browseOverlay   = document.getElementById('browse-overlay');
  const browseList      = document.getElementById('browse-list');
  const browsePathInput = document.getElementById('browse-path-input');
  const browseStatus    = document.getElementById('browse-status');
  let currentBrowsePath = '/';
  let browseEntries     = [];   // cached for re-sort
  let browseSortBy      = 'name'; // 'name' | 'date'
  let browseSortDir     = 1;      // 1=asc, -1=desc

  function formatMtime(ts) {
    if (!ts) return '';
    const d = new Date(ts * 1000);
    const yy = d.getFullYear(), mm = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0'), mi = String(d.getMinutes()).padStart(2,'0');
    return `${yy}-${mm}-${dd} ${hh}:${mi}`;
  }

  function sortedEntries(entries) {
    return [...entries].sort((a, b) => {
      if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
      if (browseSortBy === 'date') return browseSortDir * ((b.mtime || 0) - (a.mtime || 0));
      return browseSortDir * a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
    });
  }

  function updateSortButtons() {
    const nameBtn = document.getElementById('sort-by-name');
    const dateBtn = document.getElementById('sort-by-date');
    const arrow = browseSortDir === 1 ? ' ↑' : ' ↓';
    nameBtn.textContent = 'Name' + (browseSortBy === 'name' ? arrow : '');
    dateBtn.textContent = 'Date' + (browseSortBy === 'date' ? arrow : '');
    nameBtn.classList.toggle('active', browseSortBy === 'name');
    dateBtn.classList.toggle('active', browseSortBy === 'date');
  }

  document.getElementById('sort-by-name').addEventListener('click', () => {
    if (browseSortBy === 'name') browseSortDir *= -1; else { browseSortBy = 'name'; browseSortDir = 1; }
    updateSortButtons();
    renderBrowseEntries(sortedEntries(browseEntries), currentBrowsePath);
  });

  document.getElementById('sort-by-date').addEventListener('click', () => {
    if (browseSortBy === 'date') browseSortDir *= -1; else { browseSortBy = 'date'; browseSortDir = -1; }
    updateSortButtons();
    renderBrowseEntries(sortedEntries(browseEntries), currentBrowsePath);
  });

  function getBrowseCreds() {
    const authType = document.getElementById('auth-type').value;
    const c = {
      host:     document.getElementById('host').value.trim(),
      port:     parseInt(document.getElementById('port').value) || 22,
      username: document.getElementById('username').value.trim(),
      authType,
    };
    if (authType === 'password') c.password = document.getElementById('password').value;
    else { c.privateKey = privateKeyContent; c.passphrase = document.getElementById('passphrase').value; }
    return c;
  }

  document.getElementById('btn-browse').addEventListener('click', () => {
    const c = getBrowseCreds();
    if (!c.host || !c.username) { alert('Please fill in Host and Username first.'); return; }
    browseOverlay.classList.add('open');
    const cur = document.getElementById('file-path').value.trim();
    const start = cur ? (cur.replace(/\/[^/]*$/, '') || '/') : '/';
    browseTo(start);
  });

  document.getElementById('browse-close').addEventListener('click', () => browseOverlay.classList.remove('open'));
  browseOverlay.addEventListener('click', e => { if (e.target === browseOverlay) browseOverlay.classList.remove('open'); });

  document.getElementById('browse-up').addEventListener('click', () => {
    const parts = currentBrowsePath.replace(/\/$/, '').split('/');
    parts.pop();
    browseTo(parts.join('/') || '/');
  });

  document.getElementById('browse-go').addEventListener('click', () => browseTo(browsePathInput.value.trim() || '/'));
  browsePathInput.addEventListener('keydown', e => { if (e.key === 'Enter') browseTo(browsePathInput.value.trim() || '/'); });

  async function browseTo(p) {
    currentBrowsePath = p;
    browsePathInput.value = p;
    browseList.innerHTML = '<div class="browse-msg">Loading...</div>';
    browseStatus.textContent = '';

    try {
      const creds = getBrowseCreds();
      const data = await invoke('browse_sftp', {
        host: creds.host, port: creds.port, username: creds.username,
        authType: creds.authType,
        password:   creds.authType === 'password' ? creds.password : null,
        privateKey: creds.authType === 'key'      ? creds.privateKey : null,
        passphrase: creds.authType === 'key'      ? creds.passphrase : null,
        path: p,
      });
      browseEntries = data.entries;
      renderBrowseEntries(sortedEntries(data.entries), p);
      browseStatus.textContent = `${data.entries.length} item${data.entries.length !== 1 ? 's' : ''}`;
    } catch (err) {
      browseList.innerHTML = `<div class="browse-msg error">✖ ${err}</div>`;
    }
  }

  function renderBrowseEntries(entries, basePath) {
    if (!entries.length) {
      browseList.innerHTML = '<div class="browse-msg">Empty directory</div>';
      return;
    }
    const frag = document.createDocumentFragment();
    entries.forEach(entry => {
      const div = document.createElement('div');
      div.className = 'browse-entry ' + (entry.isDir ? 'is-dir' : 'is-file');

      const icon = document.createElement('span');
      icon.className = 'browse-icon';
      icon.textContent = entry.isDir ? '▸' : '·';

      const name = document.createElement('span');
      name.className = 'browse-name';
      name.textContent = entry.name + (entry.isDir ? '/' : '');

      const date = document.createElement('span');
      date.className = 'browse-date';
      date.textContent = formatMtime(entry.mtime);

      div.appendChild(icon);
      div.appendChild(name);
      if (!entry.isDir) {
        const size = document.createElement('span');
        size.className = 'browse-size';
        size.textContent = formatBytes(entry.size);
        div.appendChild(size);
      }
      div.appendChild(date);

      div.addEventListener('click', () => {
        const fullPath = (basePath.replace(/\/$/, '') + '/' + entry.name).replace('//', '/');
        if (entry.isDir) {
          browseTo(fullPath);
        } else {
          browseOverlay.classList.remove('open');
          document.getElementById('file-path').value = fullPath;
          const tab = createTab();
          connectTab(tab);
        }
      });
      frag.appendChild(div);
    });
    browseList.innerHTML = '';
    browseList.appendChild(frag);
  }

  // ── Find panel ────────────────────────────────────────────────────────────
  const findPanel   = document.getElementById('find-panel');
  const findInput   = document.getElementById('find-input');
  const findCount   = document.getElementById('find-count');
  const findResults = document.getElementById('find-results');

  document.getElementById('btn-find-panel').addEventListener('click', () => toggleFindPanel());
  document.getElementById('find-close').addEventListener('click', () => findPanel.classList.remove('open'));

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      e.preventDefault();
      toggleFindPanel(true);
    }
    if (e.key === 'Escape' && findPanel.classList.contains('open')) {
      findPanel.classList.remove('open');
    }
  });

  function toggleFindPanel(forceOpen) {
    const open = forceOpen === true ? true : !findPanel.classList.contains('open');
    findPanel.classList.toggle('open', open);
    if (open) { findInput.focus(); findInput.select(); runFind(); }
  }

  findInput.addEventListener('input', runFind);

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function runFind() {
    const tab = getActiveTab();
    const q = findInput.value.trim().toLowerCase();

    if (!q || !tab) {
      findResults.innerHTML = '<div class="find-empty">Type to search in current tab\'s log</div>';
      findCount.textContent = '';
      return;
    }

    const matches = [];
    tab.allLogs.forEach((entry, i) => {
      if (!entry.isStatus && entry.text.toLowerCase().includes(q)) {
        matches.push({ ...entry, lineNum: i + 1 });
      }
    });

    findCount.textContent = matches.length
      ? `${matches.length} match${matches.length !== 1 ? 'es' : ''}`
      : 'No matches';

    if (!matches.length) {
      findResults.innerHTML = '<div class="find-empty">No matches found</div>';
      return;
    }

    const frag = document.createDocumentFragment();
    const re = new RegExp(`(${escapeRe(q)})`, 'gi');

    matches.forEach(entry => {
      const div = document.createElement('div');
      div.className = 'find-item';

      const numEl = document.createElement('span');
      numEl.className = 'find-item-num';
      numEl.textContent = entry.lineNum;

      const textEl = document.createElement('span');
      textEl.className = 'find-item-text';
      textEl.innerHTML = escapeHtml(entry.text).replace(re, '<span class="highlight">$1</span>');

      div.appendChild(numEl);
      div.appendChild(textEl);
      div.addEventListener('click', () => scrollToLine(tab, entry.lineNum));
      frag.appendChild(div);
    });

    findResults.innerHTML = '';
    findResults.appendChild(frag);
  }

  function scrollToLine(tab, lineNum) {
    const lineEl = tab.logEl.querySelector(`[data-line="${lineNum}"]`);
    if (!lineEl) return;

    // Pause autoscroll while jumping
    const prev = tab.autoScroll;
    tab.autoScroll = false;
    autoscrollToggle.classList.remove('on');

    lineEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
    lineEl.classList.add('line-flash');
    setTimeout(() => {
      lineEl.classList.remove('line-flash');
      tab.autoScroll = prev;
      autoscrollToggle.classList.toggle('on', prev);
    }, 1000);
  }

  // Resize handle
  (function () {
    const handle = document.getElementById('find-resize');
    let dragging = false, startY = 0, startH = 0;

    handle.addEventListener('mousedown', e => {
      dragging = true;
      startY = e.clientY;
      startH = findPanel.offsetHeight;
      document.body.style.userSelect = 'none';
      document.body.style.cursor = 'n-resize';
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const newH = Math.max(120, Math.min(600, startH + (startY - e.clientY)));
      findPanel.style.height = newH + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
    });
  })();

  // ── Theme ─────────────────────────────────────────────────────────────────
  let currentTheme = 'dark';

  function applyTheme(theme, save = true) {
    currentTheme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('btn-theme');
    btn.textContent = theme === 'dark' ? '☀' : '☾';
    btn.title = theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme';
    if (save) {
      invoke('save_prefs', { data: { theme } }).catch(() => {});
    }
  }

  document.getElementById('btn-theme').addEventListener('click', () => {
    applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
  });

  async function initPrefs() {
    try {
      const prefs = await invoke('get_prefs');
      if (prefs && prefs.theme) applyTheme(prefs.theme, false);
    } catch {}
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  createTab('Tab 1');
  initConfigs();
  initPrefs();

  // ── Tauri event listener for SSH log streaming ────────────────────────────
  listen('log-event', event => {
    const { tabId, type, text } = event.payload;
    const tab = getTab(parseInt(tabId));
    if (!tab) return;

    if (type === 'log') {
      appendLog(tab, text);
    } else if (type === 'status') {
      tab.connected = true;
      if (tab.id === activeTabId) {
        setStatus('connected', text);
        connectBtn.textContent = '⏹ Disconnect';
        connectBtn.classList.add('disconnect');
      }
      appendLog(tab, '▶ ' + text, true);
      renderTabBar();
    } else if (type === 'error') {
      if (tab.id === activeTabId) setStatus('error', text);
      appendLog(tab, '✖ ' + text, false, true);
    } else if (type === 'closed') {
      tab.connected = false;
      if (tab.id === activeTabId) {
        setStatus('', 'Disconnected');
        connectBtn.textContent = '⚡ Connect';
        connectBtn.classList.remove('disconnect');
      }
      renderTabBar();
    }
  });
</script>
</body>
</html>
